<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - ChampsMART1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="fonts/font-awesome-4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/main2.css">
</head>
<body>

    <!-- Header Placeholder -->
    <div id="main-header-placeholder"></div>

    <!-- Register Area -->
    <main style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background-color: #f9f9f9; padding: 60px 15px;">
        <div class="container" style="max-width: 550px;">
            <div class="contact-box" style="flex-direction: column; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
                <div class="contact-form" style="border: none; padding: 50px 40px;">
                    <h4 style="font-weight: 600;">Create an Account</h4>
                    <p class="text-center mb-4" style="color: #888; font-size: 14px;">Join ChampsMART1 for a premium experience</p>

                    <!-- Form action updated to register.php -->
                    <form action="register.php" method="POST">
                        <div class="input-group">
                            <i class="fa fa-user"></i>
                            <input type="text" name="fullname" placeholder="Full Name" required>
                        </div>

                        <div class="input-group">
                            <i class="fa fa-envelope"></i>
                            <input type="email" name="email" placeholder="Email Address" required>
                        </div>
                        
                        <div class="input-group">
                            <i class="fa fa-lock"></i>
                            <input type="password" name="password" placeholder="Password" required>
                        </div>

                        <div class="input-group">
                            <i class="fa fa-check-circle"></i>
                            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                        </div>

                        <button type="submit" class="submit-btn mt-2">CREATE ACCOUNT</button>
                    </form>

                    <div class="text-center mt-4">
                        <span style="color: #666; font-size: 14px;">Already have an account? </span>
                        <a href="login.html" style="color: #717fe0; font-weight: 600; font-size: 14px;">Login Here</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="main-footer-placeholder"></div>

    <!-- Scripts -->
    <script src="vendor/jquery/jquery-3.2.1.min.js"></script>
    <script src="js/main2.js"></script>

</body>
</html>
