<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - ChampsMART1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="fonts/iconic/css/material-design-iconic-font.min.css">
    <link rel="stylesheet" href="fonts/linearicons-v1.0.0/icon-font.min.css">
    <link rel="stylesheet" href="css/main2.css">
</head>
<body>

    <div id="main-header-placeholder"></div>

    <section class="title-section" style="background-image: url('images/bg-01.jpg');">
        <div class="container">
            <h2>Contact</h2>
        </div>
    </section>

    <section class="contact-page">
        <div class="container">
            <div class="contact-box">
                <div class="contact-form">
                    <h4>Send Us A Message</h4>
                    <form action="#">
                        <div class="input-group">
                            <i class="zmdi zmdi-email"></i>
                            <input type="email" placeholder="Your Email Address" required>
                        </div>
                        <div class="input-group">
                            <textarea placeholder="How Can We Help?" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">SUBMIT</button>
                    </form>
                </div>

                <div class="contact-info">
                    <div class="info-item" style="display: flex; gap: 20px;">
                        <span class="lnr lnr-map-marker" style="font-size: 22px;"></span>
                        <div>
                            <h5>Address</h5>
                            <p style="color: #666; font-size: 14px; margin-top: 5px;">12 BALMORAL DRIVE, WOKING, GU22 8EZ</p>
                        </div>
                    </div>
                    
                    <div class="info-item" style="display: flex; gap: 20px;">
                        <span class="lnr lnr-phone-handset" style="font-size: 22px;"></span>
                        <div>
                            <h5>Lets Talk</h5>
                            <p style="color: #717fe0; margin-top: 5px; font-weight: 500;">+447402218915</p>
                        </div>
                    </div>

                    <div class="info-item" style="display: flex; gap: 20px;">
                        <span class="lnr lnr-envelope" style="font-size: 22px;"></span>
                        <div>
                            <h5>Sale Support</h5>
                            <p style="color: #717fe0; margin-top: 5px; font-weight: 500;">usman902003@gmail.com</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="main-footer-placeholder"></div>

    <script src="vendor/jquery/jquery-3.2.1.min.js"></script>
    <script src="js/main2.js"></script> 
</body>
</html>
